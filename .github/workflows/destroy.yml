name: "Infrastructure Destruction"

on:
  workflow_dispatch:

jobs:
  terraform-destroy:
    name: "Cleanup AWS Environment"
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "Terraform Destroy (Selective)"
        id: destroy_step
        run: |
          cd terraform
          terraform init -reconfigure
          # Niszczymy tylko serwer i sieć, zostawiamy klucz SSH (deployer)
          # Upewnij się, że nazwy (np. app_server) zgadzają się z Twoimi plikami .tf
          terraform destroy -auto-approve \
            -target=aws_instance.app_server \
            -target=aws_security_group.main_sg \
            -target=aws_subnet.main_subnet \
            -target=aws_vpc.main_vpc