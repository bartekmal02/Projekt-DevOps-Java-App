name: "Infrastructure Deployment"

on:
  push:
    branches:
      - master

jobs:
  terraform:
    name: "Build, Provision and Deploy"
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}
      TF_VAR_public_key: ${{ secrets.TF_VAR_PUBLIC_KEY }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # --- ETAP 1: BUDOWANIE (Java + Maven + Docker) ---
      - name: "Set up JDK 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Build App and Docker Image"
        id: build_step
        run: |
          mvn clean package -DskipTests
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-java-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-java-app:latest

      - name: "Discord: Build Status"
        if: always()
        run: |
          if [ "${{ steps.build_step.outcome }}" == "success" ]; then
            MSG="✅ **Etap 1/3:** Build & Docker Push - OK ⬇️"
          else
            MSG="❌ **Etap 1/3:** Build & Docker Push - BŁĄD! 🛑"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" ${{ secrets.DISCORD_WEBHOOK }}

      # --- ETAP 2: INFRASTRUKTURA (Terraform) ---
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      # --- INTELIGENTNY IMPORT LUB KREACJA KLUCZA ---
      - name: "Terraform: Smart Key Check & Import"
        run: |
          cd terraform
          terraform init -reconfigure
          # Sprawdzamy, czy klucz o nazwie z Secretów jest już w pliku stanu (state)
          if terraform state show aws_key_pair.deployer > /dev/null 2>&1; then
            echo "✅ Klucz $TF_VAR_key_name jest już w pliku stanu. Pomijam import."
          else
            echo "🔍 Klucza $TF_VAR_key_name nie ma w stanie. Próba importu z AWS..."
            # Próbujemy zaimportować klucz o nazwie przekazanej w zmiennej
            terraform import aws_key_pair.deployer "$TF_VAR_key_name" || echo "⚠️ Klucz nie istnieje w AWS. Terraform stworzy go w następnym kroku."
          fi

      - name: "Terraform Deploy"
        id: tf_step
        run: |
          cd terraform
          terraform init -reconfigure
          terraform apply -auto-approve
          echo "SERVER_IP=$(terraform output -raw instance_public_ip)" >> $GITHUB_ENV

      - name: "Discord: Terraform Status"
        if: always()
        run: |
          if [ "${{ steps.tf_step.outcome }}" == "success" ]; then
            MSG="✅ **Etap 2/3:** Terraform Infrastructure - OK ⬇️"
          else
            MSG="❌ **Etap 2/3:** Terraform Infrastructure - BŁĄD! 🛑"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" ${{ secrets.DISCORD_WEBHOOK }}

      # --- ETAP 3: ANSIBLE (Deploy) ---
      # --- WSTRZYKIWANIE WEBHOOKA DO GRAFANY ---
      - name: "Inject Grafana Alerts Webhook"
        run: |
          # Poprawiona ścieżka: dodano 'ansible/' na początku
          sed -i "s|DISCORD_URL_PLACEHOLDER|${{ secrets.DISCORD_GRAFANA_WEBHOOK }}|g" ansible/grafana/provisioning/alerting/contact_points.yaml

      - name: "Ansible Configuration"
        id: ansible_step
        if: success()
        run: |
          echo "${{ secrets.AWS_SSH_KEY_CONTENT }}" > private_key.pem
          chmod 600 private_key.pem
          until nc -zv ${{ env.SERVER_IP }} 22; do sleep 5; done
          ansible-playbook -i "${{ env.SERVER_IP }}," \
            --private-key private_key.pem -u ubuntu \
            --ssh-common-args='-o StrictHostKeyChecking=no' \
            -e "docker_image_name=${{ secrets.DOCKERHUB_USERNAME }}/my-java-app:latest" \
            ansible/playbook.yml

      - name: "Discord: Ansible Status"
        if: always()
        run: |
          if [ "${{ steps.ansible_step.outcome }}" == "success" ]; then
            MSG="✅ **Etap 3/3:** Ansible Deployment - OK 🏁"
          else
            MSG="❌ **Etap 3/3:** Ansible Deployment - BŁĄD! 🛑"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" ${{ secrets.DISCORD_WEBHOOK }}

      # --- FINAL REPORT ---
      - name: "Discord: Final Success Report"
        if: success()
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{
            "content": "🏆 **DEPLOYMENT SUCCESSFUL!** 🏆\n\n🔗 **Linki:**\n🌐 App: http://${{ env.SERVER_IP }}:8080\n📊 Grafana: http://${{ env.SERVER_IP }}:3000\n📈 Prom: http://${{ env.SERVER_IP }}:9090"
          }' ${{ secrets.DISCORD_WEBHOOK }}